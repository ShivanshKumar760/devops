services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - RUNTIME_ENV=DOCKER
    depends_on:
      - db
  db:
    image: postgres:13
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
